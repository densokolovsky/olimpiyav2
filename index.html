<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Olympia — Лазерная депиляция в Одессе · Candela GentleLase Pro</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Unbounded:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --mint:#42B8B2;
  --mint-deep:#2FA29C;
  --mint-wash:#E8F5F3;
  --milk:#F7FAFA;
  --white:#FFFFFF;
  --ink:#2F353A;
  --ink-2:#6C7680;
  --nude:#D9B9AA;
  --line:#DCE9E7;
  --line-soft:#EAF2F1;
  --graphite:#1E2428;
  --radius:16px;
  --radius-lg:24px;
  --shadow-sm:0 1px 2px rgba(47,53,58,.04), 0 2px 6px rgba(47,53,58,.04);
  --shadow-md:0 4px 18px rgba(47,53,58,.06), 0 2px 4px rgba(47,53,58,.04);
  --shadow-card:0 1px 0 rgba(47,53,58,.03), 0 10px 30px -12px rgba(47,53,58,.10);
  --container: 1200px;
  --ease:cubic-bezier(.2,.7,.2,1);
}

*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--white);color:var(--ink);}
body{
  font-family:'Manrope',system-ui,-apple-system,sans-serif;
  font-size:16px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
button{font-family:inherit}

.display{font-family:'Unbounded',sans-serif;font-weight:400;letter-spacing:-.01em;line-height:1.05}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.02em;font-size:12px;text-transform:uppercase;color:var(--ink-2)}

.container{max-width:var(--container);margin:0 auto;padding:0 24px}
.section{padding:96px 0}
.section--tight{padding:72px 0}
.section--milk{background:var(--milk)}
.section--mint{background:var(--mint-wash)}
.section--graphite{background:var(--graphite);color:#E8EEF0}

.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--mint-deep);font-weight:600}
.eyebrow::before{content:"";width:22px;height:1px;background:var(--mint)}

.h1{font-family:'Unbounded',sans-serif;font-weight:300;font-size:clamp(36px,5.6vw,68px);line-height:1.02;letter-spacing:-.015em}
.h2{font-family:'Unbounded',sans-serif;font-weight:300;font-size:clamp(28px,3.6vw,46px);line-height:1.08;letter-spacing:-.01em;margin:0 0 12px}
.h3{font-family:'Unbounded',sans-serif;font-weight:400;font-size:22px;line-height:1.2;letter-spacing:-.005em;margin:0}
.lede{color:var(--ink-2);font-size:17px;max-width:56ch}
.muted{color:var(--ink-2)}

.hairline{height:1px;background:var(--line-soft);border:0;margin:0}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:10px;
  padding:15px 22px;border-radius:999px;font-weight:600;font-size:15px;
  border:1px solid transparent;cursor:pointer;transition:all .22s var(--ease);
  white-space:nowrap;
}
.btn--primary{background:var(--mint);color:#fff}
.btn--primary:hover{background:var(--mint-deep);transform:translateY(-1px);box-shadow:0 10px 24px -10px rgba(66,184,178,.55)}
.btn--ghost{background:transparent;color:var(--ink);border-color:var(--line)}
.btn--ghost:hover{border-color:var(--ink);background:#fff}
.btn--dark{background:#fff;color:var(--graphite)}
.btn--dark:hover{background:var(--mint);color:#fff}
.btn--lg{padding:18px 28px;font-size:16px}
.btn .arr{transition:transform .22s var(--ease)}
.btn:hover .arr{transform:translateX(3px)}

/* Nav */
.nav{
  position:sticky;top:0;z-index:50;background:rgba(255,255,255,.82);
  backdrop-filter:saturate(140%) blur(14px);
  -webkit-backdrop-filter:saturate(140%) blur(14px);
  border-bottom:1px solid transparent;transition:border-color .2s;
}
.nav--scrolled{border-bottom-color:var(--line-soft)}
.nav__inner{display:flex;align-items:center;justify-content:space-between;height:72px}
.logo{display:flex;align-items:center;gap:10px;font-family:'Unbounded',sans-serif;font-weight:500;font-size:19px;letter-spacing:.01em}
.logo__mark{width:28px;height:28px;border-radius:50%;background:
  radial-gradient(circle at 30% 30%,#fff 0 18%, transparent 18%),
  conic-gradient(from 200deg,var(--mint),#7fd8d2,var(--mint-deep),var(--mint));
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.5)}
.logo__sub{font-family:'Manrope',sans-serif;font-size:11px;color:var(--ink-2);letter-spacing:.18em;text-transform:uppercase;font-weight:500;margin-left:2px;border-left:1px solid var(--line);padding-left:10px}
.nav__links{display:flex;gap:28px;font-size:14px;color:var(--ink-2);font-weight:500}
.nav__links a{transition:color .2s}
.nav__links a:hover{color:var(--ink)}
.nav__cta{display:flex;align-items:center;gap:14px}
.nav__phone{font-weight:600;color:var(--ink);font-size:14px}
@media (max-width:900px){
  .nav__links{display:none}
  .nav__phone{display:none}
}

/* Hero */
.hero{position:relative;padding:56px 0 96px;overflow:hidden}
.hero__grid{display:grid;grid-template-columns:1.15fr 1fr;gap:64px;align-items:center}
@media (max-width:960px){.hero__grid{grid-template-columns:1fr;gap:40px}}
.hero__offer{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--mint-wash);color:var(--mint-deep);
  padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;
  margin-bottom:24px;
}
.hero__offer .dot{width:6px;height:6px;border-radius:50%;background:var(--mint);box-shadow:0 0 0 4px rgba(66,184,178,.18)}
.hero h1{margin:0 0 20px}
.hero h1 .em{font-style:italic;font-weight:300;color:var(--mint-deep)}
.hero__lede{color:var(--ink-2);font-size:18px;max-width:52ch;margin:0 0 32px}
.hero__cta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:36px}
.hero__badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:999px;
  background:#fff;border:1px solid var(--line);
  font-size:13px;color:var(--ink);font-weight:500;
}
.badge .d{width:6px;height:6px;border-radius:50%;background:var(--mint)}

/* Hero figure */
.hero__figure{position:relative;aspect-ratio:4/5;border-radius:var(--radius-lg);overflow:hidden;background:var(--mint-wash)}
.hero__figure::before{content:"";position:absolute;inset:0;background:
  radial-gradient(120% 80% at 80% 10%, rgba(255,255,255,.9), transparent 50%),
  radial-gradient(80% 80% at 10% 90%, rgba(217,185,170,.35), transparent 55%),
  linear-gradient(180deg, #EEF7F5 0%, #E1EFEC 100%);
}
.hero__placeholder{
  position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:space-between;
  padding:22px;color:var(--ink-2);
}
.hero__stripes{
  position:absolute;inset:0;background:
    repeating-linear-gradient(135deg, rgba(66,184,178,.05) 0 2px, transparent 2px 14px);
  mix-blend-mode:multiply;
}
.hero__orb{
  position:absolute;width:260px;height:260px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #fff, #9ed8d3 60%, var(--mint) 100%);
  filter:blur(.4px);
  top:18%;left:50%;transform:translateX(-50%);
  box-shadow:0 30px 80px -20px rgba(66,184,178,.35);
}
.hero__card{
  position:absolute;padding:14px 16px;background:#fff;border-radius:14px;
  box-shadow:var(--shadow-card);display:flex;gap:12px;align-items:center;font-size:13px;
}
.hero__card--a{top:6%;left:6%}
.hero__card--b{bottom:6%;right:6%}
.hero__card .num{font-family:'Unbounded',sans-serif;font-weight:400;font-size:22px;color:var(--mint-deep);line-height:1}
.hero__card .lbl{color:var(--ink-2);font-size:12px}

/* Marquee trust bar */
.trust{border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);padding:18px 0;background:#fff}
.trust__row{display:flex;gap:40px;align-items:center;justify-content:space-between;flex-wrap:wrap;color:var(--ink-2);font-size:13px}
.trust__row span{display:inline-flex;gap:10px;align-items:center}
.trust__row svg{color:var(--mint-deep)}

/* Benefits grid */
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}
@media (max-width:900px){.grid-3,.grid-4{grid-template-columns:repeat(2,1fr)}}
@media (max-width:560px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}

.card{
  background:#fff;border:1px solid var(--line-soft);
  border-radius:var(--radius);padding:26px;
  transition:transform .25s var(--ease), border-color .25s, box-shadow .25s;
}
.card:hover{border-color:var(--line);box-shadow:var(--shadow-card);transform:translateY(-2px)}
.card__ico{
  width:44px;height:44px;border-radius:12px;background:var(--mint-wash);
  display:flex;align-items:center;justify-content:center;color:var(--mint-deep);margin-bottom:18px;
}
.card__title{font-family:'Unbounded',sans-serif;font-weight:400;font-size:17px;margin:0 0 8px;letter-spacing:-.005em}
.card__text{color:var(--ink-2);font-size:14.5px;margin:0;line-height:1.55}

/* Section header */
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:40px;margin-bottom:44px;flex-wrap:wrap}
.sec-head__left{max-width:680px}
.sec-head p{margin:0;color:var(--ink-2);font-size:17px;max-width:56ch}

/* Process steps */
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
@media (max-width:800px){.steps{grid-template-columns:1fr}}
.step{position:relative;padding:28px;border-radius:var(--radius);background:#fff;border:1px solid var(--line-soft)}
.step__num{font-family:'Unbounded',sans-serif;font-weight:300;font-size:42px;color:var(--mint);line-height:1}
.step__title{font-family:'Unbounded',sans-serif;font-weight:400;font-size:19px;margin:18px 0 8px}
.step__text{color:var(--ink-2);font-size:14.5px;margin:0}

/* Timeline */
.timeline{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--line-soft);border-radius:var(--radius);overflow:hidden;background:#fff;margin-top:28px}
@media (max-width:800px){.timeline{grid-template-columns:1fr}}
.tl-item{padding:22px;border-right:1px solid var(--line-soft);position:relative}
.tl-item:last-child{border-right:0}
@media (max-width:800px){.tl-item{border-right:0;border-bottom:1px solid var(--line-soft)} .tl-item:last-child{border-bottom:0}}
.tl-item__k{font-family:'Unbounded',sans-serif;font-size:14px;color:var(--mint-deep);margin-bottom:8px}
.tl-item__v{font-size:14.5px;color:var(--ink)}
.tl-item__bar{height:3px;background:var(--line-soft);margin-top:14px;border-radius:2px;overflow:hidden}
.tl-item__bar i{display:block;height:100%;background:var(--mint)}

/* For-whom */
.fw-list{list-style:none;padding:0;margin:0;display:grid;gap:12px}
.fw-item{
  display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:flex-start;
  padding:18px 22px;border:1px solid var(--line-soft);border-radius:14px;background:#fff;
}
.fw-item .chk{width:28px;height:28px;border-radius:50%;background:var(--mint-wash);color:var(--mint-deep);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fw-item p{margin:0;font-size:15.5px}

/* Zones */
.zone-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.zone-tab{padding:10px 16px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:13.5px;font-weight:500;color:var(--ink-2);cursor:pointer;transition:all .2s}
.zone-tab:hover{color:var(--ink)}
.zone-tab--active{background:var(--ink);color:#fff;border-color:var(--ink)}
.zones{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media (max-width:900px){.zones{grid-template-columns:repeat(2,1fr)}}
@media (max-width:520px){.zones{grid-template-columns:1fr}}
.zone{
  position:relative;padding:22px;border-radius:var(--radius);background:#fff;border:1px solid var(--line-soft);
  transition:all .22s var(--ease);cursor:pointer;
}
.zone:hover{border-color:var(--mint);transform:translateY(-2px);box-shadow:var(--shadow-card)}
.zone__tag{position:absolute;top:14px;right:14px;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:var(--mint-deep);background:var(--mint-wash);padding:4px 8px;border-radius:999px}
.zone__ill{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--mint-wash),#d9ede9);display:flex;align-items:center;justify-content:center;color:var(--mint-deep);margin-bottom:14px}
.zone__name{font-family:'Unbounded',sans-serif;font-weight:400;font-size:16px;margin:0 0 4px}
.zone__dur{font-size:12.5px;color:var(--ink-2);margin-bottom:14px}
.zone__price{font-family:'Unbounded',sans-serif;font-size:20px;color:var(--ink);display:flex;align-items:baseline;gap:6px}
.zone__price .from{font-family:'Manrope',sans-serif;font-size:12px;color:var(--ink-2);font-weight:500;text-transform:lowercase}
.zone__price .uah{font-family:'Manrope',sans-serif;font-size:13px;color:var(--ink-2);font-weight:500}

/* Packages */
.packs{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
@media (max-width:900px){.packs{grid-template-columns:1fr}}
.pack{
  padding:30px;border-radius:var(--radius-lg);background:linear-gradient(180deg,#fff, #fbfcfc);
  border:1px solid var(--line-soft);position:relative;overflow:hidden;
  transition:all .25s var(--ease);
}
.pack:hover{transform:translateY(-3px);box-shadow:var(--shadow-card)}
.pack--featured{background:linear-gradient(180deg, #F1FAF8, #E3F2EF);border-color:#BEE3DD}
.pack--featured::after{content:"";position:absolute;top:0;right:0;width:160px;height:160px;
  background:radial-gradient(circle at top right, rgba(66,184,178,.18), transparent 70%);pointer-events:none}
.pack__badge{display:inline-block;font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:var(--mint-deep);margin-bottom:16px}
.pack__title{font-family:'Unbounded',sans-serif;font-weight:400;font-size:20px;margin:0 0 18px;line-height:1.2}
.pack__list{list-style:none;padding:0;margin:0 0 22px;display:grid;gap:8px}
.pack__list li{display:flex;gap:10px;align-items:center;font-size:14.5px;color:var(--ink)}
.pack__list .dot{width:5px;height:5px;border-radius:50%;background:var(--mint)}
.pack__price{font-family:'Unbounded',sans-serif;font-size:30px;line-height:1;margin-bottom:4px}
.pack__save{font-size:13px;color:var(--mint-deep);font-weight:600}
.pack__foot{margin-top:22px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.pack__link{font-size:13px;color:var(--ink-2);font-weight:600;border-bottom:1px solid var(--line);padding-bottom:2px;cursor:pointer;transition:color .2s}
.pack__link:hover{color:var(--ink)}

/* Safety */
.safety{display:grid;grid-template-columns:1.1fr 1fr;gap:48px;align-items:center}
@media (max-width:900px){.safety{grid-template-columns:1fr}}
.safety__list{list-style:none;padding:0;margin:20px 0 0;display:grid;gap:4px}
.safety__item{padding:20px 0;border-top:1px solid var(--line-soft);display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:flex-start}
.safety__item:last-child{border-bottom:1px solid var(--line-soft)}
.safety__num{font-family:'Unbounded',sans-serif;color:var(--ink-2);font-size:14px;padding-top:2px;letter-spacing:.02em}
.safety__t{font-family:'Unbounded',sans-serif;font-weight:400;font-size:16.5px;margin:0 0 4px}
.safety__d{margin:0;color:var(--ink-2);font-size:14.5px}

.figure-card{
  aspect-ratio:4/5;border-radius:var(--radius-lg);overflow:hidden;position:relative;
  background:linear-gradient(160deg,#EEF7F5,#DCEBE8 60%,#D9B9AA22);
}
.figure-card::before{content:"";position:absolute;inset:0;background:
  repeating-linear-gradient(45deg, rgba(47,53,58,.04) 0 1px, transparent 1px 18px);}
.figure-card__tag{position:absolute;bottom:18px;left:18px;right:18px;color:var(--ink-2);display:flex;justify-content:space-between;align-items:center}
.figure-card__glass{position:absolute;top:18px;right:18px;background:rgba(255,255,255,.86);backdrop-filter:blur(8px);border-radius:12px;padding:12px 14px;font-size:12px;box-shadow:var(--shadow-sm)}
.figure-card__glass b{font-family:'Unbounded',sans-serif;font-weight:400;display:block;font-size:15px;color:var(--ink)}

/* Prep tabs */
.prep{background:#fff;border:1px solid var(--line-soft);border-radius:var(--radius-lg);overflow:hidden}
.prep__tabs{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--line-soft)}
.prep__tab{padding:22px;text-align:left;background:transparent;border:0;cursor:pointer;font-family:'Unbounded',sans-serif;font-weight:400;font-size:17px;color:var(--ink-2);border-bottom:2px solid transparent;transition:all .2s}
.prep__tab--active{color:var(--ink);border-bottom-color:var(--mint);background:var(--mint-wash)}
.prep__body{padding:28px;display:grid;gap:14px;grid-template-columns:repeat(2,1fr)}
@media (max-width:700px){.prep__body{grid-template-columns:1fr}}
.prep__li{display:grid;grid-template-columns:auto 1fr;gap:14px;padding:14px 16px;background:var(--milk);border-radius:12px;align-items:flex-start}
.prep__li .n{width:26px;height:26px;border-radius:50%;background:#fff;border:1px solid var(--line);color:var(--ink);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prep__li p{margin:0;font-size:14.5px;line-height:1.5}

/* Specialist */
.spec{display:grid;grid-template-columns:1fr 1.1fr;gap:48px;align-items:center}
@media (max-width:900px){.spec{grid-template-columns:1fr}}
.spec__stats{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:32px;border-top:1px solid var(--line-soft);padding-top:24px}
.spec__stat .num{font-family:'Unbounded',sans-serif;font-weight:300;font-size:38px;color:var(--ink);line-height:1}
.spec__stat .lbl{font-size:13px;color:var(--ink-2);margin-top:6px}

/* Results */
.results{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media (max-width:900px){.results{grid-template-columns:repeat(2,1fr)}}
@media (max-width:520px){.results{grid-template-columns:1fr}}
.result{aspect-ratio:3/4;border-radius:var(--radius);overflow:hidden;position:relative;background:var(--mint-wash)}
.result__img{position:absolute;inset:0;background:linear-gradient(160deg,#F4FAF9,#DFECE9 70%,#E8D6CE);}
.result__img::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(90deg, rgba(66,184,178,.06) 0 1px, transparent 1px 10px)}
.result__split{position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.7)}
.result__lbl{position:absolute;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;font-size:11px;color:var(--ink-2);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.result__foot{position:absolute;bottom:14px;left:14px;right:14px;background:rgba(255,255,255,.92);padding:10px 12px;border-radius:10px;backdrop-filter:blur(6px)}
.result__foot b{display:block;font-family:'Unbounded',sans-serif;font-weight:400;font-size:14px}
.result__foot span{font-size:12px;color:var(--ink-2)}

/* Reviews */
.reviews{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media (max-width:900px){.reviews{grid-template-columns:1fr}}
.review{padding:28px;background:#fff;border:1px solid var(--line-soft);border-radius:var(--radius);display:flex;flex-direction:column;gap:18px}
.review__stars{display:flex;gap:3px;color:var(--mint-deep)}
.review__text{font-size:15.5px;line-height:1.55;color:var(--ink);margin:0;flex:1}
.review__who{display:flex;gap:12px;align-items:center;padding-top:14px;border-top:1px solid var(--line-soft)}
.review__avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--mint-wash),#d9ede9);display:flex;align-items:center;justify-content:center;color:var(--mint-deep);font-family:'Unbounded',sans-serif;font-size:15px;font-weight:400}
.review__who b{font-weight:600;font-size:14px}
.review__who span{font-size:12.5px;color:var(--ink-2);display:block}

/* FAQ */
.faq{max-width:820px;margin:0 auto}
.faq__item{border-bottom:1px solid var(--line-soft)}
.faq__btn{width:100%;text-align:left;background:none;border:0;padding:22px 0;display:flex;gap:20px;align-items:center;justify-content:space-between;cursor:pointer;font-family:'Unbounded',sans-serif;font-weight:400;font-size:17.5px;color:var(--ink);line-height:1.3}
.faq__btn:hover{color:var(--mint-deep)}
.faq__toggle{width:32px;height:32px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .22s}
.faq__item--open .faq__toggle{background:var(--mint);border-color:var(--mint);color:#fff;transform:rotate(45deg)}
.faq__panel{max-height:0;overflow:hidden;transition:max-height .35s var(--ease)}
.faq__item--open .faq__panel{max-height:500px}
.faq__panel p{margin:0 0 22px;color:var(--ink-2);font-size:15.5px;line-height:1.6;max-width:62ch}

/* CTA block (graphite) */
.cta{padding:84px 0;color:#E8EEF0}
.cta__grid{display:grid;grid-template-columns:1.1fr 1fr;gap:56px;align-items:center}
@media (max-width:900px){.cta__grid{grid-template-columns:1fr}}
.cta h2{color:#fff}
.cta p{color:#A6B1B7;font-size:17px;max-width:50ch}
.cta__form{background:#262D32;border-radius:var(--radius-lg);padding:28px;border:1px solid #323A3F}
.field{display:grid;gap:6px;margin-bottom:14px}
.field label{font-size:12.5px;color:#A6B1B7;letter-spacing:.04em;text-transform:uppercase;font-weight:600}
.field input, .field select{
  background:#1A2024;border:1px solid #323A3F;color:#fff;padding:14px 16px;border-radius:10px;font-size:15px;font-family:inherit;
  transition:all .2s;
}
.field input:focus, .field select:focus{border-color:var(--mint);outline:0;background:#1E2428}
.field--err input{border-color:#D97A6A}
.field__err{color:#E79B8F;font-size:12.5px}
.radio-row{display:flex;gap:10px;flex-wrap:wrap}
.radio{flex:1;min-width:90px}
.radio input{display:none}
.radio label{
  display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 14px;border-radius:10px;
  background:#1A2024;border:1px solid #323A3F;cursor:pointer;font-size:13.5px;font-weight:500;color:#C4CDD2;transition:all .2s;text-align:center;
}
.radio input:checked + label{background:var(--mint);color:#fff;border-color:var(--mint)}
.submit-row{display:flex;gap:14px;align-items:center;margin-top:6px;flex-wrap:wrap}
.consent{font-size:12px;color:#8691978e;line-height:1.5;max-width:260px}

.cta__side{display:grid;gap:14px}
.cta__tile{display:flex;gap:14px;align-items:center;padding:18px 20px;background:#262D32;border:1px solid #323A3F;border-radius:14px}
.cta__tile .ico{width:40px;height:40px;border-radius:10px;background:#1A2024;display:flex;align-items:center;justify-content:center;color:var(--mint)}
.cta__tile b{font-family:'Unbounded',sans-serif;font-weight:400;font-size:15px;display:block;color:#fff}
.cta__tile span{font-size:13px;color:#A6B1B7}

/* Success */
.success{padding:40px 20px;text-align:center}
.success__ico{width:56px;height:56px;border-radius:50%;background:var(--mint);color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.success h3{font-family:'Unbounded',sans-serif;font-weight:400;color:#fff;margin:0 0 8px;font-size:22px}
.success p{color:#A6B1B7;margin:0}

/* Contacts */
.contact{display:grid;grid-template-columns:1fr 1.4fr;gap:32px}
@media (max-width:900px){.contact{grid-template-columns:1fr}}
.contact__info{display:grid;gap:16px}
.contact__row{display:flex;gap:14px;align-items:flex-start;padding:18px;background:#fff;border:1px solid var(--line-soft);border-radius:14px}
.contact__row .ico{width:36px;height:36px;border-radius:10px;background:var(--mint-wash);color:var(--mint-deep);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.contact__row b{display:block;font-family:'Unbounded',sans-serif;font-weight:400;font-size:15px;margin-bottom:2px}
.contact__row span{font-size:14px;color:var(--ink-2)}
.map{background:#fff;border:1px solid var(--line-soft);border-radius:var(--radius-lg);aspect-ratio:16/11;overflow:hidden;position:relative}
.map__grid{position:absolute;inset:0;background:
  linear-gradient(#EEF5F4 1px, transparent 1px) 0 0/40px 40px,
  linear-gradient(90deg, #EEF5F4 1px, transparent 1px) 0 0/40px 40px,
  #F7FAFA;
}
.map__roads{position:absolute;inset:0}
.map__road{position:absolute;background:#fff;box-shadow:0 0 0 1px var(--line-soft)}
.map__pin{position:absolute;top:42%;left:48%;transform:translate(-50%,-100%);display:flex;flex-direction:column;align-items:center;gap:6px}
.map__pin .p{width:26px;height:26px;border-radius:50%;background:var(--mint);box-shadow:0 0 0 6px rgba(66,184,178,.2),0 6px 16px -4px rgba(66,184,178,.5);border:3px solid #fff;animation:pulse 2.2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 6px rgba(66,184,178,.2),0 6px 16px -4px rgba(66,184,178,.5)}50%{box-shadow:0 0 0 14px rgba(66,184,178,.05),0 6px 16px -4px rgba(66,184,178,.5)}}
.map__label{background:#fff;border:1px solid var(--line);padding:6px 10px;border-radius:8px;font-size:12px;font-weight:600;box-shadow:var(--shadow-sm)}

/* Footer */
.footer{padding:40px 0 32px;background:#fff;border-top:1px solid var(--line-soft)}
.footer__row{display:flex;justify-content:space-between;gap:24px;align-items:center;flex-wrap:wrap}
.footer p{margin:0;font-size:13px;color:var(--ink-2)}
.footer__meta{display:flex;gap:22px;font-size:13px;color:var(--ink-2)}

/* Sticky mobile CTA */
.sticky-cta{
  position:fixed;left:16px;right:16px;bottom:16px;z-index:60;
  background:var(--ink);color:#fff;border-radius:16px;padding:14px 18px;
  display:none;align-items:center;justify-content:space-between;gap:14px;
  box-shadow:0 18px 40px -10px rgba(47,53,58,.4);
  animation:rise .4s var(--ease);
}
@keyframes rise{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
.sticky-cta b{font-family:'Unbounded',sans-serif;font-weight:400;font-size:15px;display:block}
.sticky-cta span{font-size:12px;color:#aeb6bc}
.sticky-cta .btn{padding:11px 16px;font-size:14px}
@media (max-width:760px){.sticky-cta{display:flex}}

/* Utility */
.row{display:flex;gap:14px;align-items:center}
.note{display:flex;gap:10px;align-items:flex-start;padding:14px 16px;background:var(--mint-wash);border-radius:12px;margin-top:20px;color:var(--ink);font-size:14px}
.note svg{color:var(--mint-deep);flex-shrink:0;margin-top:2px}

/* Price table */
.ptable{background:#fff;border:1px solid var(--line-soft);border-radius:var(--radius-lg);overflow:hidden}
.ptable__row{display:grid;grid-template-columns:1fr 120px 140px;gap:16px;padding:18px 24px;border-top:1px solid var(--line-soft);align-items:center;transition:background .15s}
.ptable__row:first-child{border-top:0}
.ptable__row:hover{background:var(--milk)}
.ptable__head{background:var(--milk);font-size:12.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-2);font-weight:600;padding:14px 24px}
.ptable__name{font-size:15px;font-weight:500}
.ptable__dur{color:var(--ink-2);font-size:14px}
.ptable__price{font-family:'Unbounded',sans-serif;font-size:17px;text-align:right}
.ptable__price .from{font-family:'Manrope',sans-serif;font-size:12px;color:var(--ink-2);font-weight:500}
@media (max-width:600px){
  .ptable__row{grid-template-columns:1fr auto;gap:6px 12px;padding:16px 18px}
  .ptable__head{display:none}
  .ptable__dur{grid-column:1/2;grid-row:2}
  .ptable__price{grid-column:2/3;grid-row:1/3;font-size:18px}
}

    ["Есть ли противопоказания?", "Есть общие ограничения: беременность, загар, некоторые заболевания кожи, приём фотосенсибилизирующих препаратов. Специалист уточнит всё на консультации и подскажет, безопасно ли проводить процедуру сейчас."],
    ["Что лучше: бритьё, воск или лазер?", "Бритьё и воск — это временные решения с постоянным раздражением и рутиной. Лазер воздействует на корень волоса и даёт длительный результат. По комфорту и качеству кожи после курса — это принципиально другое ощущение."],
  ];
  const [open, setOpen] = useState(0);
  return (
    <section className="section section--milk" id="faq">
      <div className="container">
        <SectionHead
          eyebrow="Ответы на частые вопросы"
          title="Всё, что важно знать до записи"
        />
        <div className="faq">
          {qa.map(([q, a], i) => (
            <div className={`faq__item ${open===i?'faq__item--open':''}`} key={i}>
              <button className="faq__btn" onClick={()=>setOpen(open===i?-1:i)}>
                <span>{q}</span>
                <span className="faq__toggle"><Icon name="plus" size={14} stroke={2.2}/></span>
              </button>
              <div className="faq__panel">
                <p>{a}</p>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

Object.assign(window, { Prep, Specialist, Results, Reviews, FAQ });


function CTABlock() {
  const [form, setForm] = useState({ name:'', phone:'', channel:'phone' });
  const [errors, setErrors] = useState({});
  const [sent, setSent] = useState(false);

  const validate = () => {
    const e = {};
    if (form.name.trim().length < 2) e.name = "Укажите имя";
    const digits = form.phone.replace(/\D/g,'');
    if (digits.length < 9) e.phone = "Введите корректный номер";
    return e;
  };

  const onSubmit = (ev) => {
    ev.preventDefault();
    const e = validate();
    setErrors(e);
    if (Object.keys(e).length === 0) setSent(true);
  };

  const fmtPhone = (v) => {
    const d = v.replace(/\D/g,'').slice(0,12);
    if (!d) return '';
    let out = '+';
    out += d.slice(0,3);
    if (d.length > 3) out += ' (' + d.slice(3,5);
    if (d.length >= 5) out += ') ';
    if (d.length > 5) out += d.slice(5,8);
    if (d.length > 8) out += '-' + d.slice(8,10);
    if (d.length > 10) out += '-' + d.slice(10,12);
    return out.trim();
  };

  return (
    <section className="section--graphite cta" id="cta">
      <div className="container cta__grid">
        <div>
          <div className="eyebrow" style={{ color:'#6BCEC8', marginBottom: 18 }}>Запись</div>
          <h2 className="h2">Запишитесь на лазерную депиляцию — подберём курс под вас</h2>
          <p>Оставьте заявку — специалист свяжется в течение рабочего дня, ответит на вопросы и поможет подобрать подходящие зоны и удобное время.</p>

          <div className="cta__side" style={{ marginTop: 32 }}>
            <div className="cta__tile">
              <span className="ico"><Icon name="spark" size={18}/></span>
              <div><b>Консультация — бесплатно</b><span>Без обязательств и записи на процедуру</span></div>
            </div>
            <div className="cta__tile">
              <span className="ico"><Icon name="heart" size={18}/></span>
              <div><b>Скидка 20% на первое посещение</b><span>Действует при записи через сайт</span></div>
            </div>
            <div className="cta__tile">
              <span className="ico"><Icon name="phone" size={18}/></span>
              <div><b>+380 48 700 04 00</b><span>Ежедневно с 9:00 до 20:00</span></div>
            </div>
          </div>
        </div>

        <form className="cta__form" onSubmit={onSubmit} noValidate>
          {sent ? (
            <div className="success">
              <div className="success__ico"><Icon name="check" size={26} stroke={2.4}/></div>
              <h3>Заявка отправлена</h3>
              <p>Спасибо, {form.name}. Мы свяжемся с вами в ближайшее время — будьте на связи.</p>
            </div>
          ) : (
            <>
              <div className={`field ${errors.name?'field--err':''}`}>
                <label>Как к вам обращаться</label>
                <input
                  type="text"
                  placeholder="Ваше имя"
                  value={form.name}
                  onChange={(e)=>setForm({...form, name:e.target.value})}
                />
                {errors.name && <span className="field__err">{errors.name}</span>}
              </div>
              <div className={`field ${errors.phone?'field--err':''}`}>
                <label>Телефон</label>
                <input
                  type="tel"
                  placeholder="+380 (00) 000-00-00"
                  value={form.phone}
                  onChange={(e)=>setForm({...form, phone: fmtPhone(e.target.value)})}
                />
                {errors.phone && <span className="field__err">{errors.phone}</span>}
              </div>
              <div className="field">
                <label>Удобный способ связи</label>
                <div className="radio-row">
                  {[['phone','Телефон','phone'],['whatsapp','WhatsApp','whatsapp'],['telegram','Telegram','msg']].map(([v,l,ico])=>(
                    <div className="radio" key={v}>
                      <input type="radio" id={`ch-${v}`} name="channel" checked={form.channel===v} onChange={()=>setForm({...form, channel:v})}/>
                      <label htmlFor={`ch-${v}`}><Icon name={ico} size={14}/>{l}</label>
                    </div>
                  ))}
                </div>
              </div>
              <div className="submit-row">
                <button type="submit" className="btn btn--primary btn--lg" style={{ flex:1 }}>
                  Записаться <Icon name="arrow" size={16} className="arr"/>
                </button>
              </div>
              <p className="consent" style={{ marginTop: 14 }}>Нажимая кнопку, вы соглашаетесь с обработкой персональных данных. Мы не передаём ваши контакты третьим лицам.</p>
            </>
          )}
        </form>
      </div>
    </section>
  );
}
